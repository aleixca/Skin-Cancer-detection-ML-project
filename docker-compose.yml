services:

  # ── ML backend: Streamlit + Random Forest model ───────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dermascan-backend
    ports:
      - "8501:8501"
    restart: unless-stopped

  # ── UI preview: React screens served by nginx ────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dermascan-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend
