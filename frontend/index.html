<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DermaScan ML</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0E1116;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter Tight", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
    }

    /* Bottom bar */
    #app-link {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 40px;
      background: rgba(14,17,22,0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 11px; color: rgba(250,250,247,0.45);
    }
    #app-link a {
      color: #6ea8fe; text-decoration: none; font-weight: 600;
    }
    #app-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Bottom bar -->
  <div id="app-link">
    <span>Live ML app →</span>
    <a href="https://skin-cancer-detection-ml-project.onrender.com" target="_blank" id="backend-link">Open ML app (Render)</a>
    <script>
      const link = document.getElementById('backend-link');
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        link.href = 'http://localhost:8501';
        link.textContent = 'Open Streamlit app on :8501';
      }
    </script>
  </div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Screen components map (pass onNav so buttons work) ───────────────────
    const SCREEN_COMPS = {
      home:      (nav) => window.ScreenHome      ? <ScreenHome      onNav={nav} /> : null,
      scan:      (nav) => window.ScreenScan      ? <ScreenScan      onNav={nav} /> : null,
      analyzing: (nav) => window.ScreenAnalyzing ? <ScreenAnalyzing onNav={nav} /> : null,
      result:    (nav) => window.ScreenResult    ? <ScreenResult    onNav={nav} /> : null,
      chat:      (nav) => window.ScreenChat      ? <ScreenChat      onNav={nav} /> : null,
      info:      (nav) => window.ScreenInfo      ? <ScreenInfo      onNav={nav} /> : null,
    };

    function App() {
      const [screen, setScreen] = useState('home');

      // Expose navigate globally so screens can call window.navigate('scan')
      useEffect(() => {
        window.navigate = setScreen;
      }, []);

      // Auto-advance from analyzing → result after 2s
      useEffect(() => {
        if (screen === 'analyzing') {
          const t = setTimeout(() => setScreen('result'), 2200);
          return () => clearTimeout(t);
        }
      }, [screen]);

      const Comp = SCREEN_COMPS[screen];

      return (
        <div style={{ paddingBottom: 40 }}>
          {window.IOSDevice
            ? <IOSDevice>{Comp(setScreen)}</IOSDevice>
            : (
              <div style={{
                width: 402, height: 874, background: '#FAFAF7',
                borderRadius: 44, overflow: 'hidden',
                boxShadow: '0 32px 64px rgba(0,0,0,0.5)',
              }}>
                {Comp(setScreen)}
              </div>
            )
          }
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

</body>
</html>
